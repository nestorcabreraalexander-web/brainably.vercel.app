<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainably Video Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            min-height: 100vh;
            background-color: #030712;
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Lava Lamp Background Elements */
        .lava-lamp-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.4;
            filter: blur(90px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: float-around 25s infinite ease-in-out;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            top: -10%;
            right: 10%;
            background: linear-gradient(135deg, #1e40af, #a855f7);
        }

        .blob-2 {
            width: 450px;
            height: 450px;
            bottom: -5%;
            left: -5%;
            background: linear-gradient(45deg, #0284c7, #06b6d4);
            animation-delay: -7s;
        }

        @keyframes float-around {
            0% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-60px) translateX(30px); }
            100% { transform: translateY(0px) translateX(0px); }
        }

        /* High-Tech Translucent Navigation Header */
        .app-nav {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            height: 65px;
            z-index: 10;
        }
        
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #22d3ee;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        .back-home {
            font-size: 0.9rem;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Main Content Grid Workspace */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
            z-index: 10;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #22d3ee, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .page-subtitle {
            color: #94a3b8;
            margin-bottom: 35px;
            font-size: 1.1rem;
        }

        /* Filtering Interface Station Control Panel */
        .search-filter-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
            background: rgba(15, 23, 42, 0.4);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
        }

        .search-wrapper input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-wrapper input:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.15);
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pill {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pill:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .pill.active {
            background: rgba(34, 211, 238, 0.15);
            border-color: #22d3ee;
            color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.1);
        }

        /* Interactive Video Grid Component */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .video-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: rgba(34, 211, 238, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Video Aspect Ratio */
            background: #020617;
        }

        .thumbnail-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .video-tag {
            align-self: flex-start;
            font-size: 0.7rem;
            font-weight: 700;
            color: #22d3ee;
            background: rgba(34, 211, 238, 0.1);
            padding: 4px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .video-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.4;
        }

        /* Ask AI Functional Integration Button Link */
        .ask-ai-btn {
            margin-top: auto;
            padding: 12px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.25);
            color: #c084fc;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 700;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .ask-ai-btn:hover {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
        }

        /* Empty State Label alert */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            font-size: 1.1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="lava-lamp-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="app-nav">
        <a href="index.html" class="logo">
            <img src="image_21b2dc.jpg" alt="Logo" class="logo-img" onerror="this.src='image_21b2dc.png'">
            Brainably Academy
        </a>
        <a href="index.html" class="back-home">&larr; Back to Home</a>
    </nav>

    <main class="main-container">
        <h1 class="page-title">Educational Video Academy</h1>
        <p class="page-subtitle">Master complex concepts visually with high-quality core tutorials.</p>

        <div class="search-filter-container">
            <div class="search-wrapper">
                <input type="text" id="videoSearch" placeholder="🔍 Search topics or subjects (e.g., Algebra, Motion, Chemical)...">
            </div>
            <div class="filter-pills">
                <button class="pill active" data-category="all">All Subjects</button>
                <button class="pill" data-category="mathematics">Mathematics</button>
                <button class="pill" data-category="chemistry">Chemistry</button>
                <button class="pill" data-category="physics">Physics</button>
            </div>
        </div>

        <div class="video-grid" id="videoGrid">
            <div class="no-results" id="noResults">🚀 No matching learning topics found. Try another search phrase!</div>
        </div>
    </main>

    <script>
        // MASSIVE 12-TRACK COMPILATION CURATED DATA DATABASE ARRAY
        const videoData = [
            // === MATHEMATICS TRACK ===
            {
                title: "How to Master Algebra Basics Fast",
                category: "mathematics",
                embedId: "ZdphZ7_rD9c"
            },
            {
                title: "The Essence of Calculus (Chapter 1)",
                category: "mathematics",
                embedId: "WUvTyaaNkzM"
            },
            {
                title: "Understanding Fractions & Layout Ratios Visually",
                category: "mathematics",
                embedId: "3m6vC9WvjGg"
            },
            {
                title: "Probability & Statistics Core Concepts",
                category: "mathematics",
                embedId: "A1mQ9kD-i9I"
            },

            // === CHEMISTRY TRACK ===
            {
                title: "The Periodic Table Explained Completely",
                category: "chemistry",
                embedId: "b87S_V7H3M0"
            },
            {
                title: "What Are Atoms and How Do They Work?",
                category: "chemistry",
                embedId: "rcKilE9CyiA"
            },
            {
                title: "Chemical Reactions & Equations Overview",
                category: "chemistry",
                embedId: "TStskvFjvno"
            },
            {
                title: "Understanding Ideal Gases and Laws",
                category: "chemistry",
                embedId: "BY9VBlV9yJw"
            },

            // === PHYSICS TRACK ===
            {
                title: "Newton's 3 Laws of Motion Made Clear",
                category: "physics",
                embedId: "O5xeyoRL95U"
            },
            {
                title: "What is Kinetic and Potential Energy?",
                category: "physics",
                embedId: "2WS1sG9xaOk"
            },
            {
                title: "The Physics of Light and Reflection Waves",
                category: "physics",
                embedId: "JXTSCZzN-gM"
            },
            {
                title: "Quantum Physics for Beginners Explained Simply",
                category: "physics",
                embedId: "Usu9xZctlPM"
            }
        ];

        let currentCategory = 'all';
        const searchInput = document.getElementById('videoSearch');
        const videoGrid = document.getElementById('videoGrid');
        const noResults = document.getElementById('noResults');

        // Render compilation handler function
        function renderVideos() {
            const query = searchInput.value.toLowerCase().trim();
            let visibleCount = 0;

            // Purge active nodes except error metrics template
            const cards = videoGrid.querySelectorAll('.video-card');
            cards.forEach(card => card.remove());

            videoData.forEach(video => {
                const matchesCategory = (currentCategory === 'all' || video.category === currentCategory);
                const matchesSearch = video.title.toLowerCase().includes(query) || video.category.toLowerCase().includes(query);

                if (matchesCategory && matchesSearch) {
                    visibleCount++;
                    
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="thumbnail-wrapper">
                            <iframe src="https://www.youtube.com/embed/${video.embedId}" allowfullscreen></iframe>
                        </div>
                        <div class="video-info">
                            <span class="video-tag">${video.category}</span>
                            <h3 class="video-title">${video.title}</h3>
                            <a href="app.html" class="ask-ai-btn">💬 Ask AI about this topic</a>
                        </div>
                    `;
                    videoGrid.appendChild(card);
                }
            });

            noResults.style.display = visibleCount === 0 ? 'block' : 'none';
        }

        // Pill Click Listener Registration Loop
        document.querySelectorAll('.filter-pills .pill').forEach(pill => {
            pill.addEventListener('click', (e) => {
                document.querySelector('.filter-pills .pill.active').classList.remove('active');
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-category');
                renderVideos();
            });
        });

        // Search Input Watcher
        searchInput.addEventListener('input', renderVideos);

        // Initial Engine Start
        window.addEventListener('DOMContentLoaded', renderVideos);
    </script>

</body>
</html>
