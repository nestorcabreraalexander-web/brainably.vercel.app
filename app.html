<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainably Study Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Premium Center Layout Nav Bar displaying your custom logo */
        .app-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            width: 100%;
            height: 65px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0d9488;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .back-home {
            font-size: 0.9rem;
            color: #475569;
            text-decoration: none;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 8px;
            background: #e2e8f0;
        }

        /* Main Area that centers the chat interface */
        .workspace {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            height: calc(100vh - 65px);
        }

        /* Beautiful Centered Chat Wrapper Card */
        #vflow-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: 750px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(15, 23, 42, 0.06);
            border: 1px solid rgba(226, 232, 240, 0.8);
            overflow: hidden;
        }
    </style>
</head>
<body>

    <nav class="app-nav">
        <a href="index.html" class="logo">
            <svg width="26" height="26" viewBox="0 0 100 100" style="vertical-align:middle;">
                <circle cx="50" cy="50" r="50" fill="#0d9488"/>
                <path d="M50 22C36 22 26 29 22 39C17 47 17 56 20 63C16 68 15 75 18 83C21 91 29 96 39 97L49 55L50 22Z" fill="white" opacity=".95"/>
            </svg>
            Brainably Workspace
        </a>
        <a href="index.html" class="back-home">&larr; Home</a>
    </nav>

    <div class="workspace">
        <div id="vflow-container"></div>
    </div>

    <script type="text/javascript">
  (function(d, t) {
      var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
      v.onload = function() {
        window.voiceflow.chat.load({
          verify: { projectID: '6a1a3c956b0f6697163e66bc' },
          url: 'https://general-runtime.voiceflow.com',
          voice: {
            url: "https://runtime-api.voiceflow.com"
          }
        });
      }
      v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
  })(document, 'script');
</script>

</body>
</html>
