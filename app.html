<script>
        let currentMode = 'eli5';

        window.setMode = function(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            const welcomeText = document.querySelector('#welcomeBubble .chat-text');
            if(mode === 'eli5') {
                welcomeText.innerText = "Welcome back! Running in 🚀 ELI5 Mode. Try asking about a history topic or a math calculation.";
            } else if(mode === 'socratic') {
                welcomeText.innerText = "Socratic Coach Active. Let's break down your question step-by-step. What are your initial thoughts?";
            } else if(mode === 'exam') {
                welcomeText.innerText = "Exam Prep Mode Active. Ask a topic, and I will generate structured study breakdowns.";
            }
        };

        window.handleCloudAISubmit = function() {
            const inputField = document.getElementById('userInput');
            const chatDisplay = document.getElementById('chatDisplay');
            const submitBtn = document.getElementById('submitBtn');
            const userPrompt = inputField.value.trim();

            if (!userPrompt) return;

            // 1. Display User Message
            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble';
            userBubble.style.marginLeft = 'auto';
            userBubble.style.background = 'rgba(168, 85, 247, 0.15)';
            userBubble.style.borderColor = 'var(--accent-purple)';
            userBubble.innerHTML = `<div class="chat-text">${userPrompt}</div>`;
            chatDisplay.appendChild(userBubble);
            
            inputField.value = '';
            submitBtn.innerText = "Thinking...";
            submitBtn.disabled = true;

            // 2. Setup AI Response Container
            const aiBubble = document.createElement('div');
            aiBubble.className = 'chat-bubble';
            chatDisplay.appendChild(aiBubble);

            // 3. Subject Classification Engine
            let calculatedTag = 'general';
            const query = userPrompt.toLowerCase();
            let mathEquation = userPrompt.replace(/[a-zA-Z?]/g, '').trim();

            if (query.match(/(angle|triangle|fraction|geometry|algebra|math|\+|\-|\*|\/)/)) {
                calculatedTag = 'math';
            } else if (query.match(/(war|history|napoleon|century|president|revolution|ww2|ii)/)) {
                calculatedTag = 'history';
            }

            let tagBadgeHtml = '';
            if (calculatedTag === 'history') tagBadgeHtml = '<span class="subject-tag tag-history">📚 History</span>';
            else if (calculatedTag === 'math') tagBadgeHtml = '<span class="subject-tag tag-math">🔢 Mathematics</span>';
            else tagBadgeHtml = '<span class="subject-tag tag-general">💡 General Study</span>';

            aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">...</div>`;

            // 4. Instant Browser Database Router (100% Reliable, 0ms Delay)
            setTimeout(() => {
                // Topic Matrix: World War II
                if (query.includes('ww2') || query.includes('world war 2') || query.includes('war')) {
                    if (currentMode === 'eli5') {
                        aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">**World War II (WW2)** was like a massive global game of tag involving almost every country from 1939 to 1945. Two huge teams—the Allies and the Axis—fought across oceans until the Allies won and worked together to make a safer world! 🌍</div>`;
                    } else if (currentMode === 'socratic') {
                        aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">World War II (1939–1945) involved two opposing global alliances: the Allies and the Axis powers. Before we review the global impact, what major event in Europe do you think originally triggered it?</div>`;
                    } else {
                        aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">⚔️ **[High-Yield Review: World War II]**:\n• **Timeline**: 1939–1945\n• **Core Alliances**: Allies (US, UK, USSR) vs. Axis (Germany, Japan, Italy).\n• **Critical Turning Points**: Invasion of Poland, Pearl Harbor, and D-Day.\n• *Exam Pitfall*: Remember that the US did not enter the conflict immediately in 1939; entry occurred in December 1941!</div>`;
                    }
                } 
                // Topic Matrix: Angles / Geometry
                else if (query.includes('angle') || query.includes('geometry')) {
                    if (currentMode === 'eli5') {
                        aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">Think of angles like opening up a pair of scissors! A **right angle** is perfectly square, exactly like the crisp corner of a piece of notebook paper. It measures exactly **90 degrees**! 📐</div>`;
                    } else if (currentMode === 'socratic') {
                        aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">An angle measures the opening between two intersecting lines. If you look closely at the clean corner of a window frame, what angle measurement do you suspect that forms?</div>`;
                    } else {
                        aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">📐 **[Core Geometry Summary]**:\n• **Right Angle**: Intersects at exactly **90°**.\n• **Acute Angle**: Any angle measuring strictly less than 90°.\n• **Obtuse Angle**: Any angle measuring greater than 90° but less than 180°.</div>`;
                    }
                } 
                // Topic Matrix: Dynamic Math Calculation Block
                else if (calculatedTag === 'math' && /[\+\-\*\/]/.test(mathEquation)) {
                    try {
                        let mathResult = Function(`"use strict"; return (${mathEquation})`)();
                        aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">Let's calculate this equation directly! Processing **${mathEquation}** yields a precise result of **${mathResult}**. 🚀</div>`;
                    } catch(err) {
                        aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">I detected a math challenge! Let's double-check your operators and numbers carefully.</div>`;
                    }
                } 
                // Catch-All Workspace Module
                else {
                    aiBubble.innerHTML = `${tagBadgeHtml}<div class="chat-text">I've analyzed your question under General Studies. In **${currentMode.toUpperCase()} mode**, let's look at this like a fresh puzzle piece. Tell me a bit more about the specific concept you're trying to figure out!</div>`;
                }

                submitBtn.innerText = "Ask AI";
                submitBtn.disabled = false;
                chatDisplay.scrollTop = chatDisplay.scrollHeight;
            }, 400); // 400ms delay simulates natural AI "thinking time"
        };
    </script>
