<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainably Study Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* COLOR THEME DESIGN SYSTEM */
        :root {
            --bg-base: #030712;
            --bg-card: #0b0f19;
            --border-color: rgba(255, 255, 255, 0.06);
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR STYLES */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #38bdf8;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
        }

        .btn-purple {
            border-color: var(--accent-purple);
            color: #d8b4fe;
        }

        /* MAIN APP GRID INTERFACE */
        .app-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            padding: 30px 40px;
            flex: 1;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        /* AI CHAT INTERFACE WORKSPACE */
        .modes-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .mode-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--accent-purple);
            color: #ffffff;
        }

        .chat-display {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-y: auto;
            min-height: 250px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .chat-bubble {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            padding: 14px 18px;
            border-radius: 14px;
            max-width: 85%;
            margin-bottom: 12px;
        }

        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }

        .chat-input {
            flex: 1;
            background: #090d16;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--accent-purple);
        }

        .action-button {
            padding: 0 24px;
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .action-button:hover {
            opacity: 0.9;
        }

        .pdf-btn {
            width: 100%;
            background: rgba(6, 182, 212, 0.05);
            border: 1px solid rgba(6, 182, 212, 0.3);
            color: #22d3ee;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .pdf-btn:hover {
            background: rgba(6, 182, 212, 0.1);
        }

        /* SIDEBAR TIMER WORKSPACE */
        .timer-container {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .vibe-tag {
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        .toggle-row {
            display: inline-flex;
            background: #090d16;
            padding: 6px;
            border-radius: 30px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            color: var(--text-muted);
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
        }

        .toggle-btn.active {
            background: var(--accent-purple);
            color: white;
        }

        .timer-digits {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 40px;
        }

        .timer-controls {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 260px;
        }

        .ctrl-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }

        .btn-start {
            background: white;
            color: black;
        }

        .btn-reset {
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">Brainably Study Room</div>
        <div class="nav-actions">
            <button class="nav-btn btn-purple">⚙️ AI Settings</button>
            <button class="nav-btn">← Dashboard</button>
        </div>
    </nav>

    <main class="app-grid">
        
        <div class="card">
            <div class="modes-row">
                <button class="mode-btn active" id="btn-eli5" onclick="setMode('eli5')">🚀 ELI5 Mode</button>
                <button class="mode-btn" id="btn-socratic" onclick="setMode('socratic')">🧠 Socratic Coach</button>
                <button class="mode-btn" id="btn-exam" onclick="setMode('exam')">⚔️ Exam Prep</button>
            </div>

            <div class="chat-display" id="chatDisplay">
                <div class="chat-bubble" id="welcomeBubble">
                    Welcome back! I am currently running in 🚀 ELI5 Mode. I'll break down complicated ideas using simple analogies and fun examples!
                </div>
            </div>

            <div class="input-area">
                <input type="text" class="chat-input" id="userInput" placeholder="Ask a question or paste complex text details...">
                <button class="action-button" id="submitBtn" onclick="askFreeAI()">Ask AI</button>
            </div>

            <button class="pdf-btn" onclick="exportToTxt()">⚡ Export Study Guide Cheat Sheet (TXT)</button>
        </div>

        <div class="card timer-container">
            <div class="vibe-tag">🔥 Current Vibe: Focus Block</div>
            
            <div class="toggle-row">
                <button class="toggle-btn active" id="btn-study" onclick="setTimerType('study')">Study Session</button>
                <button class="toggle-btn" id="btn-break" onclick="setTimerType('break')">Chill Break</button>
            </div>

            <div class="timer-digits" id="timerDisplay">25:00</div>

            <div class="timer-controls">
                <button class="ctrl-btn btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
                <button class="ctrl-btn btn-reset" onclick="resetTimer()">Reset</button>
            </div>
        </div>

    </main>

    <script>
        // 1. AI MODE CONFIGURATION
        let currentMode = 'eli5';
        const modePrompts = {
            eli5: "You are an educator using ELI5 Mode. Break down complicated ideas using simple analogies and fun examples tailored for middle or high school students.",
            socratic: "You are a Socratic Coach. Do not give the answer directly. Ask short, guiding questions that lead the student to discover the concept themselves.",
            exam: "You are an Exam Preparation assistant. Extract key definitions, create actionable flashcard review blocks, and give 1 multiple-choice test question based on the topic."
        };

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            const welcomeMsg = {
                eli5: "Switched to 🚀 ELI5 Mode. I'll explain complex things simply!",
                socratic: "Switched to 🧠 Socratic Coach Mode. Let's think through your questions together.",
                exam: "Switched to ⚔️ Exam Prep Mode. Ready to generate practice questions and cheat sheets!"
            };
            
            document.getElementById('welcomeBubble').innerText = welcomeMsg[mode];
        }

        // ==========================================================================
        // ⚡ UNIFIED KEYLESS COGNITIVE FETCH ENGINE (HUGGING FACE TRANSFERS)
        // ==========================================================================
        async function askFreeAI() {
            const inputField = document.getElementById('userInput');
            const chatDisplay = document.getElementById('chatDisplay');
            const submitBtn = document.getElementById('submitBtn');
            const promptText = inputField.value.trim();

            if (!promptText) return;

            // Append student question to chat view
            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble';
            userBubble.style.marginLeft = 'auto';
            userBubble.style.background = 'rgba(168, 85, 247, 0.15)';
            userBubble.style.borderColor = 'var(--accent-purple)';
            userBubble.innerText = promptText;
            chatDisplay.appendChild(userBubble);
            
            inputField.value = '';
            submitBtn.innerText = '⏳ Thinking...';
            submitBtn.disabled = true;

            // Generate structural system prompt based on active selected layout button
            const systemInstruction = modePrompts[currentMode];

            try {
                // Fetch direct from public serverless processing layer
                const res = await fetch('https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `<|system|>\n${systemInstruction}\n<|user|>\n${promptText}\n<|assistant|>\n`,
                        parameters: { max_new_tokens: 350, temperature: 0.6 }
                    })
                });

                const data = await res.json();

                const aiBubble = document.createElement('div');
                aiBubble.className = 'chat-bubble';

                if (data && data[0] && data[0].generated_text) {
                    let cleanText = data[0].generated_text.split('<|assistant|>')[1] || data[0].generated_text;
                    aiBubble.innerText = cleanText.trim();
                } else if (data.error && data.error.includes('loading')) {
                    aiBubble.innerText = "⏳ The server node is waking up. Please resend your message in a few seconds!";
                } else {
                    throw new Error("Formatting variance");
                }

                chatDisplay.appendChild(aiBubble);

            } catch (error) {
                // Offline fallback sandbox processing array
                const fallbackBubble = document.createElement('div');
                fallbackBubble.className = 'chat-bubble';
                fallbackBubble.innerText = `=== 📍 BRAINABLY ARCHIVE ENGINE READOUT ===\n\n[Mode: ${currentMode.toUpperCase()}]\nYour query "${promptText}" has been received. Let's analyze this step by step using your core metrics workbook! Review your current vocabulary indices while the public pipeline synchronizes.`;
                chatDisplay.appendChild(fallbackBubble);
            }

            submitBtn.innerText = 'Ask AI';
            submitBtn.disabled = false;
            chatDisplay.scrollTop = chatDisplay.scrollHeight; // Auto Scroll
        }

        // 2. POMODORO TIMER MECHANICAL CODE
        let timer;
        let isRunning = false;
        let timeRemaining = 1500; // 25 Minutes standard entry

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('timerDisplay').innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            const startBtn = document.getElementById('startBtn');
            if (isRunning) {
                clearInterval(timer);
                startBtn.innerText = 'Start';
                isRunning = false;
            } else {
                isRunning = true;
                startBtn.innerText = 'Pause';
                timer = setInterval(() => {
                    if (timeRemaining > 0) {
                        timeRemaining--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timer);
                        alert("Session complete! Time to switch vibes.");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            document.getElementById('startBtn').innerText = 'Start';
            const activeType = document.getElementById('btn-study').classList.contains('active') ? 'study' : 'break';
            timeRemaining = activeType === 'study' ? 1500 : 300;
            updateTimerDisplay();
        }

        function setTimerType(type) {
            document.getElementById('btn-study').classList.remove('active');
            document.getElementById('btn-break').classList.remove('active');
            document.getElementById(`btn-${type}`).classList.add('active');
            resetTimer();
        }

        // 3. DOCUMENT MANAGEMENT FILE OUTPUTS
        function exportToTxt() {
            const historyText = document.getElementById('chatDisplay').innerText;
            const blob = new Blob([historyText], { type: "text/plain" });
            const link = document.createElement("a");
            link.download = "Brainably-Study-Guide.txt";
            link.href = window.URL.createObjectURL(blob);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
