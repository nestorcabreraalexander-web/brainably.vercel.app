<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainably – Free AI Homework Helper for Students</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
--brand:#0D9488;--brand-dark:#0F766E;--brand-light:#F0FDFA;
--yellow:#FDE68A;--yellow-dark:#F59E0B;
--bg:#F8FAFC;--text:#0F172A;--muted:#64748B;
--white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--white);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.04);position:sticky;top:0;z-index:300}
.logo{font-size:1.35rem;font-weight:900;color:var(--brand);display:flex;align-items:center;gap:6px;text-decoration:none}
.school-tag{font-size:.72rem;font-weight:800;color:var(--muted);margin-left:3px}
nav ul { list-style: none; display: flex; gap: 2px; }
nav ul li button { background: none; border: none; font-family: 'Nunito', sans-serif; font-size: .83rem; font-weight: 700; color: var(--muted); cursor: pointer; padding: 6px 11px; border-radius: 50px; transition: all .2s; }
nav ul li button:hover, nav ul li button.active { background: var(--brand-light); color: var(--brand); }

.page{display:none;flex-direction:column;flex:1;animation:fadeIn .3s ease;}
.page.active{display:flex !important;}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

.hero{text-align:center;padding:60px 20px 40px;background:linear-gradient(150deg,#F0FDFA 0%,#F8FAFC 55%,#FEF3C7 100%);flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center}
.hero-badge{display:inline-block;background:var(--yellow);color:#92400E;font-size:.72rem;font-weight:800;padding:4px 13px;border-radius:50px;margin-bottom:14px;letter-spacing:.06em;text-transform:uppercase}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:700;line-height:1.15;max-width:700px;margin:0 auto 14px}
.hero h1 em{font-style:italic;color:var(--brand)}
.hero p{color:var(--muted);font-size:1.1rem;max-width:520px;margin:0 auto 26px;line-height:1.7}
.btn-primary{background:var(--brand);color:white;border:none;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;padding:14px 32px;border-radius:50px;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(13,148,136,.3);text-decoration:none;display:inline-block}
.btn-primary:hover{background:var(--brand-dark);transform:translateY(-2px)}

.app-container {
    flex: 1;
    width: 100%;
    height: calc(100vh - 65px);
    background: var(--bg);
}
#coze-web-layout {
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

  <nav>
    <a href="#" onclick="showPage('home')" class="logo">
      <svg width="24" height="24" viewBox="0 0 100 100" style="vertical-align:middle; margin-right:4px;">
        <circle cx="50" cy="50" r="50" fill="#0D9488"/>
        <path d="M50 20C38 20 28 26 24 35C19 42 19 50 22 57C18 61 17 68 20 75C23 83 30 88 40 89C44 90 47 89 49 87L49 52L50 52L50 20Z" fill="white" opacity=".95"/>
        <circle cx="80" cy="22" r="8" fill="#F59E0B"/>
      </svg>
      Brainably <span class="school-tag">AI Tutor</span>
    </a>
    <ul>
      <li><button id="nav-home" class="active" onclick="showPage('home')">Home</button></li>
      <li><button id="nav-helper" onclick="showPage('helper')">AI Assistant</button></li>
    </ul>
  </nav>

  <div id="page-home" class="page active">
    <section class="hero">
      <div class="hero-badge">🚀 Empowering Students</div>
      <h1>Stuck on schoolwork?<br>Meet <em>Brainably</em>.</h1>
      <p>Your brilliant AI companion that drops direct answers to break down complex homework problems step-by-step.</p>
      <button onclick="showPage('helper')" class="btn-primary">Open AI Assistant →</button>
    </section>
  </div>

  <div id="page-helper" class="page">
    <div class="app-container">
      <div id="coze-web-layout"></div>
    </div>
  </div>

  <script>
  // Page Switcher Layout Engine
  function showPage(pageId) {
    document.getElementById('page-home').classList.remove('active');
    document.getElementById('page-helper').classList.remove('active');
    document.getElementById('nav-home').classList.remove('active');
    document.getElementById('nav-helper').classList.remove('active');
    
    document.getElementById('page-' + pageId).classList.add('active');
    document.getElementById('nav-' + pageId).classList.add('active');
  }
  </script>

  <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.6/libs/oversea/index.js"></script>
  <script>
    // Paste the custom layout configuration right here from Coze's screen!
    // Make sure it includes: el: document.getElementById('coze-web-layout'), and layout: 'inline'
  </script>

</body>
</html>
