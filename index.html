<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainably Workspace</title>
    <style>
        /* 1. BASE STYLES & BACKGROUND */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a; /* Deep obsidian blue background */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 2. CENTERED APPLICATION CONTAINER */
        .app-container {
            background-color: #1e293b; /* Sleek slate card color */
            border: 1px solid #334155;
            border-radius: 16px;
            width: 100%;
            max-width: 750px;
            padding: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        /* 3. HEADER STYLES */
        .app-header {
            text-align: center;
            margin-bottom: 28px;
            border-bottom: 2px solid #334155;
            padding-bottom: 20px;
        }

        .app-header h1 {
            font-size: 32px;
            color: #38bdf8; /* Vibrant neon blue */
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .app-header p {
            color: #94a3b8;
            font-size: 14px;
        }

        /* 4. SECTION & CARD LAYOUTS */
        .section-block {
            margin-bottom: 24px;
        }

        .section-block h3 {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        /* 5. INPUT & BUTTON DESIGN */
        .input-group {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: #f8fafc;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8; /* Glow border on focus */
        }

        button {
            padding: 14px 24px;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        button:hover {
            background-color: #0369a1;
            transform: translateY(-1px); /* Slight lift animation */
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.4); /* Neon button glow */
        }

        /* 6. OUTPUT TERMINAL BOX */
        .output-box {
            margin-top: 14px;
            padding: 18px;
            background-color: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
            min-height: 120px;
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* 7. AUDIO CONTROLS ROW */
        .audio-row {
            display: flex;
            gap: 12px;
        }

        .btn-audio {
            background-color: #334155;
            color: #f8fafc;
            flex: 1;
        }

        .btn-audio:hover {
            background-color: #475569;
            box-shadow: 0 4px 12px rgba(71, 85, 105, 0.3);
        }

        .btn-stop {
            background-color: #991b1b;
        }

        .btn-stop:hover {
            background-color: #b91c1c;
            box-shadow: 0 4px 12px rgba(185, 28, 28, 0.4);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <h1>Brainably</h1>
            <p>Integrated AI Teacher Sandbox & Focus Environment</p>
        </header>

        <main class="section-block">
            <h3>🤖 AI Teacher Sandbox</h3>
            <div class="input-group">
                <input type="text" id="topicInput" placeholder="Enter a lesson topic (e.g., Photosynthesis)...">
                <button onclick="generateLesson()">Generate Outline</button>
            </div>
            <div class="output-box" id="aiOutput">Your generated lesson plan outline will appear here...</div>
        </main>

        <footer class="section-block" style="margin-bottom: 0;">
            <h3>🎵 Focus Audio Environment</h3>
            <div class="audio-row">
                <button class="btn-audio" onclick="playFocusSound()">🔊 Start Focus Frequency</button>
                <button class="btn-audio btn-stop" onclick="stopFocusSound()">⏹️ Stop Audio</button>
            </div>
        </footer>

    </div>

    <script>
        // Placeholder function for your existing Groq API integration logic
        function generateLesson() {
            const input = document.getElementById('topicInput').value;
            const output = document.getElementById('aiOutput');
            
            if (!input) {
                output.innerText = "Please enter a topic first!";
                return;
            }
            
            output.innerText = `Connecting to cloud engine... Generating lesson outline for: "${input}"`;
            
            // Your custom fetch logic drops directly right here to update output.innerText
        }

        // Built-in browser synthesizer audio logic
        let audioCtx;
        let oscillator;

        function playFocusSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); // Relaxing tone
                oscillator.connect(audioCtx.destination);
                oscillator.start();
            }
        }

        function stopFocusSound() {
            if (oscillator) {
                oscillator.stop();
                oscillator.disconnect();
                audioCtx = null;
                oscillator = null;
            }
        }
    </script>

</body>
</html>
