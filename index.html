<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainably – Premium AI Homework Helper for Students</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Playfair+Display:ital,wght=0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #0d9488;
  --brand-dark: #115e59;
  --brand-light: #f0fdfa;
  --accent: #f59e0b;
  --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  --card-bg: rgba(255, 255, 255, 0.85);
  --text-main: #0f172a;
  --text-muted: #475569;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg-gradient);
  color: var(--text-main);
  font-family: 'Plus Jakarta Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
}

body { display: flex; flex-direction: column; }

nav {
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(12px);
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(226, 232, 240, 0.8);
}

.logo {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--brand);
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
}

.school-tag {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  background: #e2e8f0;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
}

.hero {
  text-align: center;
  padding: 80px 24px;
  max-width: 900px;
  margin: auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 28px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  background: #feffff;
  border: 1px solid rgba(13, 148, 136, 0.2);
  color: var(--brand-dark);
  font-size: 0.8rem;
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 100px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 7vw, 4.2rem);
  font-weight: 700;
  line-height: 1.1;
}

.hero h1 em { font-style: italic; color: var(--brand); font-weight: 600; }

.hero p {
  color: var(--text-muted);
  font-size: 1.25rem;
  max-width: 580px;
  line-height: 1.6;
}

/* Beautiful Launch App Button */
.launch-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--brand);
  color: white;
  text-decoration: none;
  padding: 16px 36px;
  font-weight: 700;
  font-size: 1.1rem;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(13, 148, 136, 0.25);
  transition: all 0.2s ease;
}

.launch-btn:hover {
  background: var(--brand-dark);
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(13, 148, 136, 0.35);
}
</style>
</head>
<body>

  <nav>
    <a href="#" class="logo">
      <svg width="28" height="28" viewBox="0 0 100 100" style="vertical-align:middle;">
        <circle cx="50" cy="50" r="50" fill="#0d9488"/>
        <path d="M50 22C36 22 26 29 22 39C17 47 17 56 20 63C16 68 15 75 18 83C21 91 29 96 39 97L49 55L50 22Z" fill="white" opacity=".95"/>
      </svg>
      Brainably <span class="school-tag">AI Tutor</span>
    </a>
  </nav>

  <section class="hero">
    <div class="hero-badge">⚡ Next-Generation Learning</div>
    <h1>Stuck on schoolwork?<br>Meet <em>Brainably</em>.</h1>
    <p>Your premium, step-by-step AI study companion designed to unpack complex subjects cleanly and completely free.</p>
    
    <a href="app.html" class="launch-btn">✨ Enter Study Room &rarr;</a>
  </section>

</body>
</html>
