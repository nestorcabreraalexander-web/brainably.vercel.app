<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainably Study Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030712;
            --bg-card: #0b0f19;
            --border-color: rgba(255, 255, 255, 0.06);
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-color); }
        .nav-logo { font-size: 1.5rem; font-weight: 800; color: #38bdf8; }
        .nav-actions { display: flex; gap: 12px; }
        .nav-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 0.88rem; cursor: pointer; text-decoration: none; }
        
        .app-grid { display: grid; grid-template-columns: 1fr 380px; gap: 24px; padding: 30px 40px; flex: 1; }
        .left-column { display: flex; flex-direction: column; }
        .right-column { display: flex; flex-direction: column; gap: 24px; }
        .card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; display: flex; flex-direction: column; }
        
        .modes-row { display: flex; gap: 12px; margin-bottom: 24px; }
        .mode-btn { flex: 1; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); color: var(--text-muted); padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease; }
        .mode-btn.active { background: rgba(168, 85, 247, 0.1); border-color: var(--accent-purple); color: #ffffff; }
        
        .chat-display { flex: 1; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; margin-bottom: 20px; overflow-y: auto; min-height: 500px; font-size: 0.95rem; line-height: 1.6; display: flex; flex-direction: column; }
        .chat-bubble { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); padding: 18px 22px; border-radius: 14px; max-width: 90%; margin-bottom: 16px; align-self: flex-start; }
        
        .subject-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .tag-history { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .tag-math { background: rgba(6, 182, 212, 0.1); color: #22d3ee; border: 1px solid rgba(6, 182, 212, 0.2); }
        .tag-general { background: rgba(168, 85, 247, 0.1); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.2); }

        .chat-text { white-space: pre-wrap; }
        .input-area { display: flex; gap: 12px; margin-bottom: 14px; }
        .chat-input { flex: 1; background: #090d16; border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; color: #ffffff; font-size: 0.95rem; outline: none; }
        .chat-input:focus { border-color: var(--accent-purple); }
        .action-button { padding: 0 24px; background: var(--accent-purple); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .pdf-btn { width: 100%; background: rgba(6, 182, 212, 0.05); border: 1px solid rgba(6, 182, 212, 0.3); color: #22d3ee; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        .timer-container { align-items: center; justify-content: center; text-align: center; }
        .vibe-tag { font-size: 0.9rem; font-weight: 800; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; }
        .toggle-row { display: inline-flex; background: #090d16; padding: 6px; border-radius: 30px; margin-bottom: 30px; border: 1px solid var(--border-color); }
        .toggle-btn { background: transparent; border: none; padding: 10px 24px; color: var(--text-muted); border-radius: 20px; font-weight: 700; font-size: 0.88rem; cursor: pointer; }
        .toggle-btn.active { background: var(--accent-purple); color: white; }
        .timer-digits { font-size: 4.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }
        .timer-controls { display: flex; gap: 12px; width: 100%; max-width: 260px; }
        .ctrl-btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; }
        .btn-start { background: white; color: black; }
        .btn-reset { background: #1e293b; color: var(--text-main); border: 1px solid var(--border-color); }
        
        .hub-title { font-size: 1.1rem; font-weight: 800; color: #ffffff; margin-bottom: 16px; }
        .streak-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: 12px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .streak-text h5 { font-size: 1.2rem; font-weight: 800; color: white; }
        .streak-text p { font-size: 0.8rem; color: rgba(255, 255, 255, 0.8); }
        .streak-icon { font-size: 2rem; }
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; text-align: center; }
        .stat-val { font-size: 1.3rem; font-weight: 800; color: var(--accent-cyan); }
        .stat-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">Brainably Study Room</div>
        <div class="nav-actions"><button class="nav-btn" onclick="location.href='index.html'">← Dashboard</button></div>
    </nav>

    <main class="app-grid">
        <div class="left-column card">
            <div class="modes-row">
                <button class="mode-btn active" id="btn-eli5" onclick="setMode('eli5')">🚀 ELI5 Mode</button>
                <button class="mode-btn" id="btn-socratic" onclick="setMode('socratic')">🧠 Socratic Coach</button>
                <button class="mode-btn" id="btn-exam" onclick="setMode('exam')">⚔️ Exam Prep</button>
            </div>

            <div class="chat-display" id="chatDisplay">
                <div class="chat-bubble" id="welcomeBubble">
                    <div class="chat-text">Welcome to your workspace! Ask any math, science, or history question to begin.</div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" class="chat-input" id="userInput" placeholder="Ask a question or paste complex text details...">
                <button class="action-button" id="submitBtn" onclick="sendToRealAI()">Ask AI</button>
            </div>

            <button class="pdf-btn" onclick="exportToTxt()">⚡ Export Study Guide Cheat Sheet (TXT)</button>
        </div>

        <div class="right-column">
            <div class="card timer-container">
                <div class="vibe-tag">🔥 Current Vibe: Focus Block</div>
                <div class="toggle-row">
                    <button class="toggle-btn active" id="btn-study" onclick="setTimerType('study')">Study Session</button>
                    <button class="toggle-btn" id="btn-break" onclick="setTimerType('break')">Chill Break</button>
                </div>
                <div class="timer-digits" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button class="ctrl-btn btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
                    <button class="ctrl-btn btn-reset" onclick="resetTimer()">Reset</button>
                </div>
            </div>

            <div class="card">
                <div class="hub-title">📊 Analytics Hub</div>
                <div class="streak-badge">
                    <div class="streak-text">
                        <h5>0 Day Streak</h5>
                        <p>Complete a block to heat up!</p>
                    </div>
                    <div class="streak-icon">🔥</div>
                </div>
                <div class="stats-summary">
                    <div class="stat-box"><div class="stat-val">0</div><div class="stat-lbl">Blocks Done</div></div>
                    <div class="stat-box"><div class="stat-val">0m</div><div class="stat-lbl">Time Tracked</div></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ==========================================================================
        // 🔑 CONFIGURATION: CHANGE THIS TO YOUR KEY AND DEPLOY TO VERCEL
        // ==========================================================================
        const PRIVATE_API_KEY = "YOUR_GROQ_API_KEY_HERE";

        let currentMode = 'eli5';
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
        }

        async function sendToRealAI() {
            const inputField = document.getElementById('userInput');
            const chatDisplay = document.getElementById('chatDisplay');
            const submitBtn = document.getElementById('submitBtn');
            const userPrompt = inputField.value.trim();

            if (!userPrompt) return;

            // Simple safety warning if you forgot to add your key before building
            if (PRIVATE_API_KEY === "YOUR_GROQ_API_KEY_HERE") {
                alert("Developer Note: Please open index.html and insert your secure API key on line 125!");
                return;
            }

            // Render User Message Bubble
            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble';
            userBubble.style.marginLeft = 'auto';
            userBubble.style.background = 'rgba(168, 85, 247, 0.15)';
            userBubble.style.borderColor = 'var(--accent-purple)';
            userBubble.innerHTML = `<div class="chat-text">${userPrompt}</div>`;
            chatDisplay.appendChild(userBubble);
            
            inputField.value = '';
            submitBtn.innerText = 'Thinking...';
            submitBtn.disabled = true;

            // Render AI Waiting Bubble
            const aiBubble = document.createElement('div');
            aiBubble.className = 'chat-bubble';
            chatDisplay.appendChild(aiBubble);

            // Constructing System Learning Mode Persona Instructions
            let systemInstruction = "You are an advanced academic tutor helper.";
            if (currentMode === 'eli5') {
                systemInstruction = "Explain the user's topic like I am 5 years old. Use highly engaging, descriptive everyday analogies and concrete real-world comparisons.";
            } else if (currentMode === 'socratic') {
                systemInstruction = "Act as an elite Socratic professor. Do not give the answer immediately. Guide the user's conceptual understanding and end with an active recall question.";
            } else if (currentMode === 'exam') {
                systemInstruction = "Act as a high-yield exam preparation tool. Provide a highly detailed outline structure with direct bold formatting keys and critical pitfalls.";
            }
            systemInstruction += " You must return your final response formatted strictly as a JSON object containing exactly two keys: 'tag' (which must be exactly 'history', 'math', or 'general') and 'answer' (your full response string text). Do not wrap the output in markdown text blocks.";

            try {
                // Direct connection securely straight to Groq
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${PRIVATE_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-specdec",
                        messages: [
                            { role: "system", content: systemInstruction },
                            { role: "user", content: userPrompt }
                        ],
                        response_format: { type: "json_object" },
                        temperature: 0.5
                    })
                });

                const rawData = await response.json();
                const parsedJson = JSON.parse(rawData.choices[0].message.content);
                
                // Beautifully style the dynamic tag returned by the AI
                let tagHtml = '';
                if (parsedJson.tag === 'history') tagHtml = '<span class="subject-tag tag-history">📚 History</span>';
                else if (parsedJson.tag === 'math') tagHtml = '<span class="subject-tag tag-math">🔢 Mathematics</span>';
                else tagHtml = '<span class="subject-tag tag-general">💡 General Study</span>';

                aiBubble.innerHTML = `${tagHtml}<div class="chat-text">${parsedJson.answer}</div>`;

            } catch (err) {
                console.error(err);
                aiBubble.innerHTML = `<div class="chat-text">⚠️ AI connection processing error. Make sure your developer cloud key is entered correctly!</div>`;
            }

            submitBtn.innerText = 'Ask AI';
            submitBtn.disabled = false;
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        // Complete standard timer modules
        let timer, isRunning = false, timerType = 'study', timeRemaining = 1500;
        function updateTimerDisplay() {
            const min = Math.floor(timeRemaining / 60), sec = timeRemaining % 60;
            document.getElementById('timerDisplay').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }
        function toggleTimer() {
            const btn = document.getElementById('startBtn');
            if (isRunning) { clearInterval(timer); btn.innerText = 'Start'; isRunning = false; }
            else {
                isRunning = true; btn.innerText = 'Pause';
                timer = setInterval(() => { if (timeRemaining > 0) { timeRemaining--; updateTimerDisplay(); } else { clearInterval(timer); resetTimer(); } }, 1000);
            }
        }
        function resetTimer() { clearInterval(timer); isRunning = false; document.getElementById('startBtn').innerText = 'Start'; timeRemaining = timerType === 'study' ? 1500 : 300; updateTimerDisplay(); }
        function setTimerType(type) { timerType = type; document.getElementById('btn-study').classList.toggle('active', type==='study'); document.getElementById('btn-break').classList.toggle('active', type==='break'); resetTimer(); }
        function exportToTxt() { const txt = document.getElementById('chatDisplay').innerText; const blob = new Blob([txt], { type: "text/plain" }); const a = document.createElement("a"); a.download = "Brainably-Study-Guide.txt"; a.href = window.URL.createObjectURL(blob); document.body.appendChild(a); a.click(); document.body.removeChild(a); }
    </script>
</body>
</html>
