<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainably Quiz Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #030712;
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* Fullscreen Confetti Canvas */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
        }

        /* Ambient Cyan & Emerald Cyber Glow */
        .ambient-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.25;
            filter: blur(120px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            width: 500px;
            height: 500px;
            top: -10%;
            right: -10%;
        }

        /* Navigation Header Bar */
        .app-nav {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            height: 65px;
            z-index: 10;
            position: relative;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: #34d399;
            text-decoration: none;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #34d399;
        }

        /* Workspace Grid Wrapper */
        .main-container {
            max-width: 800px;
            width: 100%;
            margin: 40px auto 0 auto;
            padding: 0 20px;
            z-index: 10;
            position: relative;
        }

        .header-block {
            margin-bottom: 35px;
            text-align: center;
        }

        .header-block h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .header-block p { color: #94a3b8; font-size: 1.05rem; }

        /* Configuration Console Form Box */
        .generator-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(15px);
            margin-bottom: 30px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #cbd5e1;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        .topic-input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(3, 7, 18, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        .topic-input:focus { border-color: #34d399; }

        .gen-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            font-weight: 700;
            padding: 0 24px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .gen-btn:hover { opacity: 0.9; }

        /* PORTED & UPGRADED MULTIPLE CHOICE RETENTION ENGINE CARDS */
        .quiz-arena-deck { display: none; }
        .quiz-arena-deck.active { display: block; }

        .quiz-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 35px;
            backdrop-filter: blur(10px);
            margin-bottom: 25px;
        }

        .q-text {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 25px;
            color: #fff;
        }

        .quiz-opts {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Option row containers */
        .qopt {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 16px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.98rem;
            font-weight: 600;
            color: #cbd5e1;
            transition: all 0.2s ease;
            text-align: left;
            width: 100%;
            outline: none;
        }

        .qopt:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* Dynamic Feedback Visual Selection States */
        .qopt.correct {
            background: rgba(16, 185, 129, 0.15) !important;
            border-color: #10b981 !important;
            color: #34d399 !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        .qopt.wrong {
            background: rgba(239, 68, 68, 0.12) !important;
            border-color: #ef4444 !important;
            color: #f87171 !important;
        }

        .loading-vibe {
            text-align: center;
            font-size: 1.1rem;
            color: #34d399;
            font-weight: 700;
            padding: 40px 0;
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="confettiCanvas"></canvas>

    <div class="ambient-glow">
        <div class="blob"></div>
    </div>

    <nav class="app-nav">
        <a href="index.html" class="logo">Brainably Quiz Arena</a>
        <a href="index.html" class="nav-btn">&larr; Dashboard</a>
    </nav>

    <main class="main-container">
        
        <header class="header-block">
            <h1>Brain Quest Challenge</h1>
            <p>Enter any topic and our AI will spin up an instant customized retention trial.</p>
        </header>

        <section class="generator-card">
            <label class="form-label">What topic are we testing?</label>
            <div class="input-group">
                <input type="text" class="topic-input" id="quizTopic" placeholder="e.g., Photosynthesis, French Revolution, Calculus Limit Laws...">
                <button class="gen-btn" onclick="generateAiCustomQuiz()">Forge Questions</button>
            </div>
        </section>

        <div class="loading-vibe" id="loaderBox">⏳ Compiling operational parameters... Synchronizing diagnostic templates...</div>

        <section class="quiz-arena-deck" id="quizArena">
            <div class="quiz-card">
                <div class="q-text" id="questionLabel">Target Question Prompt Display Box?</div>
                <div class="quiz-opts" id="optionsContainer">
                    </div>
            </div>
        </section>

    </main>

    <script>
        let correctOptionIndex = null;
        let answerGateLocked = false;

        async function generateAiCustomQuiz() {
            const topicValue = document.getElementById('quizTopic').value.trim();
            if(!topicValue) return;

            const apiKey = localStorage.getItem('brainably_groq_key');
            if(!apiKey) {
                alert("Missing Setup API Key! Please visit the AI Study Room (app.html), open the gear icon settings bar at the top, save your free Groq token, and return here!");
                return;
            }

            // Interface Mode Toggles
            document.getElementById('quizArena').classList.remove('active');
            document.getElementById('loaderBox').style.display = 'block';
            answerGateLocked = false;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey.trim()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            {
                                role: "system",
                                content: "You are the Brainably Quiz Matrix Engine. Your job is to generate exactly 1 multiple choice question about the user's topic. You must output your response in raw JSON format matching this structure perfectly with no other text, conversational elements, or markdown blocks:\n\n{\n  \"question\": \"The actual question text string goes here\",\n  \"options\": [\"Option A\", \"Option B\", \"Option C\", \"Option D\"],\n  \"correctIndex\": 0\n}\n\nMake sure correctIndex is an integer from 0 to 3 representing the array position of the correct answer string."
                            },
                            { role: "user", content: `Generate 1 multiple choice quiz question about: ${topicValue}` }
                        ],
                        response_format: { type: "json_object" },
                        temperature: 0.6
                    })
                });

                document.getElementById('loaderBox').style.display = 'none';

                if(!response.ok) {
                    alert("Authorization connection bottleneck encountered. Re-verify your Groq setup parameters.");
                    return;
                }

                const data = await response.json();
                const quizData = JSON.parse(data.choices[0].message.content);

                // Map target parameters directly to operational state tracks
                document.getElementById('questionLabel').innerText = quizData.question;
                correctOptionIndex = quizData.correctIndex;

                const optionsContainer = document.getElementById('optionsContainer');
                optionsContainer.innerHTML = '';

                quizData.options.forEach((optText, index) => {
                    const optionBtn = document.createElement('button');
                    optionBtn.className = 'qopt';
                    optionBtn.innerText = optText;
                    optionBtn.onclick = () => evaluateOptionSelection(optionBtn, index);
                    optionsContainer.appendChild(optionBtn);
                });

                document.getElementById('quizArena').classList.add('active');

            } catch(e) {
                document.getElementById('loaderBox').style.display = 'none';
                alert("An error occurred parsing JSON telemetry packets. Click forge again to retry.");
                console.error(e);
            }
        }

        function evaluateOptionSelection(buttonNode, clickedIndex) {
            if(answerGateLocked) return; // Prevent double click scoring exploits
            answerGateLocked = true;

            const optionsList = document.getElementById('optionsContainer').children;

            if(clickedIndex === correctOptionIndex) {
                buttonNode.classList.add('correct');
                launchConfettiExplosionEngine();
                
                // 📊 AUTOMATED SKILL PROGRESS ENGINE
                // Increments Chemistry scorecard matrices by 15% upon correct diagnostics
                try {
                    let currentChemSkill = parseInt(localStorage.getItem('brainably_metric_chemistry') || '25');
                    currentChemSkill = Math.min(currentChemSkill + 15, 100);
                    localStorage.setItem('brainably_metric_chemistry', currentChemSkill);
                } catch(err) { console.log("Analytics synchronization tracking block offline."); }
            } else {
                buttonNode.classList.add('wrong');
                // Auto expose accurate response nodes immediately
                optionsList[correctOptionIndex].classList.add('correct');
            }
        }

        // ==========================================================================
        // HARDWARE ACCELERATED CONFETTI RENDERING SUBSYSTEM
        // ==========================================================================
        let confettiArray = [];
        const canvasElement = document.getElementById("confettiCanvas");
        const canvasContext = canvasElement.getContext("2d");

        function resizeConfettiCanvasView() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeConfettiCanvasView);

        class ConfettiParticleNode {
            constructor() {
                this.x = window.innerWidth / 2;
                this.y = window.innerHeight + 20;
                this.radius = Math.random() * 5 + 4;
                this.speedX = (Math.random() - 0.5) * 16;
                this.speedY = -(Math.random() * 12 + 12);
                this.gravity = 0.38;
                this.friction = 0.99;
                const vibrantColors = ["#34d399", "#22d3ee", "#a855f7", "#f43f5e", "#fbbf24"];
                this.particleColor = vibrantColors[Math.floor(Math.random() * vibrantColors.length)];
                this.particleOpacity = 1;
            }
            updatePhysicsState() {
                this.speedX *= this.friction;
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.speedY > 0) this.particleOpacity -= 0.015;
            }
            drawVectorUnit(ctx) {
                ctx.save();
                ctx.globalAlpha = this.particleOpacity;
                ctx.fillStyle = this.particleColor;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function launchConfettiExplosionEngine() {
            resizeConfettiCanvasView();
            for (let i = 0; i < 120; i++) confettiArray.push(new ConfettiParticleNode());
            if (confettiArray.length === 120) executeFrameTelemetryLoop();
        }

        function executeFrameTelemetryLoop() {
            canvasContext.clearRect(0, 0, canvasElement.width, canvasElement.height);
            for (let i = confettiArray.length - 1; i >= 0; i--) {
                const p = confettiArray[i];
                p.updatePhysicsState();
                p.drawVectorUnit(canvasContext);
                if (p.particleOpacity <= 0 || p.y > window.innerHeight + 30) confettiArray.splice(i, 1);
            }
            if (confettiArray.length > 0) requestAnimationFrame(executeFrameTelemetryLoop);
        }
    </script>
</body>
</html>
